name: Kong Configuration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "code/config/kong.yaml"
  pull_request:
    branches: [main]
    paths:
      - "code/config/kong.yaml"

jobs:
  deck:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./code/docker

    steps:
      # - name: Setup decK
      #   uses: kong/setup-deck@v1
      #   with:
      #     deck-version: "1.55.0"

      # - name: Warm up Kong API Gateway
      #   run: |
      #     curl -s -o /dev/null -w "%{http_code}" $DECK_KONG_ADDR -H $DECK_HEADERS

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Run Docker Compose
        run: doppler run -p 20206205tech -c prd -- docker compose -f docker-compose.yml up -d
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Check running containers
        run: docker ps

      - name: Wait for Kong Gateway
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:8001/status; do echo "Waiting for Kong..."; sleep 2; done'

      - name: Copy Kong Config to Container
        run: docker cp ../config/kong.yaml kong-manager:/app/kong.yaml

      - name: Validate Kong Config
        run: docker exec kong-manager deck gateway validate kong.yaml

      - name: Preview Changes (Diff)
        run: docker exec kong-manager deck gateway diff kong.yaml

      - name: Apply Changes (Sync)
        if: github.ref == 'refs/heads/main'
        run: docker exec kong-manager deck gateway sync kong.yaml
